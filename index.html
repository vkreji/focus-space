<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>focus space</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">focus</h1>
                <p class="tagline">your personal workspace</p>
            </div>

            <!-- Timer Section -->
            <div class="timer-section">
                <div class="timer-display">
                    <div id="timerTime" class="timer-time">25:00</div>
                    <div class="timer-label">focus session</div>
                </div>
                <div class="timer-controls">
                    <button id="startTimer" class="timer-btn primary">start</button>
                    <button id="pauseTimer" class="timer-btn secondary hidden">pause</button>
                    <button id="resetTimer" class="timer-btn secondary">reset</button>
                </div>
                <div class="timer-presets">
                    <button class="preset-btn" data-minutes="25">25m</button>
                    <button class="preset-btn" data-minutes="45">45m</button>
                    <button class="preset-btn" data-minutes="60">60m</button>
                </div>
            </div>

            <!-- Today's Focus -->
            <div class="focus-section">
                <h3>today's focus</h3>
                <div id="focusList" class="focus-list"></div>
                <input type="text" id="focusInput" class="focus-input" placeholder="what do you want to focus on?">
            </div>

            <!-- Stats -->
            <div class="stats-section">
                <div class="stat-card">
                    <div class="stat-value" id="todayMinutes">0</div>
                    <div class="stat-label">minutes today</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="todaySessions">0</div>
                    <div class="stat-label">sessions</div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <h2 id="currentDate" class="date-display"></h2>
                    <p class="date-subtitle">what are you working on?</p>
                </div>
                <div class="header-actions">
                    <button id="newTaskBtn" class="action-btn primary">+ new task</button>
                </div>
            </header>

            <!-- Task List -->
            <div class="tasks-container">
                <div id="tasksList" class="tasks-list">
                    <div class="empty-state">
                        <p>no tasks yet</p>
                        <p class="empty-hint">click "new task" to get started</p>
                    </div>
                </div>
            </div>

            <!-- Task Modal -->
            <div id="taskModal" class="modal hidden">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 id="modalTitle">new task</h3>
                        <button class="close-btn" id="closeModal">×</button>
                    </div>
                    <div class="modal-body">
                        <input type="text" id="taskTitle" class="task-input" placeholder="task title" autofocus>
                        <textarea id="taskNotes" class="task-notes" placeholder="notes (optional)" rows="4"></textarea>
                        <div class="task-meta">
                            <select id="taskPriority" class="priority-select">
                                <option value="normal">normal priority</option>
                                <option value="high">high priority</option>
                                <option value="low">low priority</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button id="saveTask" class="btn primary">save</button>
                        <button id="cancelTask" class="btn secondary">cancel</button>
                        <button id="deleteTask" class="btn danger hidden">delete</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
